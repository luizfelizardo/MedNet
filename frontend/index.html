<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedNET</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🚀 MedNET</h1>

    <div class="speed-box">
        <div class="speed-value" id="speed">0.00</div>
        <div class="speed-unit">Mbps</div>
    </div>

    <div class="provider-box">
        <span id="ispName">Aguardando início...</span>
        <span class="separator">|</span>
        <span id="ipAddress">--.--.--.--</span>
    </div>

    <div class="stats">
        <div class="card">
            <span>Ping</span>
            <strong id="ping">--</strong>
        </div>
        <div class="card">
            <span>Jitter</span>
            <strong id="jitter">--</strong>
        </div>
        <div class="card">
            <span>Download</span>
            <strong id="download">--</strong>
        </div>
        <div class="card">
            <span>Upload</span>
            <strong id="upload">--</strong>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="chart" width="800" height="250"></canvas>
    </div>

    <button id="startBtn">Iniciar Teste</button>

    <div id="resultOverlay" class="result-overlay hidden">
        <div class="result-modal">
            <div class="result-header">🎉 TESTE CONCLUÍDO</div>
            
            <p id="ispVerdict" class="isp-verdict">Analisando conexão...</p>
            
            <div class="result-grid">
                <div class="result-card dl">
                    <span class="arrow">↓</span>
                    <div class="result-info">
                        <label>DOWNLOAD RECORDED</label>
                        <span id="resDownload">0.00 Mbps</span>
                    </div>
                </div>
                <div class="result-card ul">
                    <span class="arrow">↑</span>
                    <div class="result-info">
                        <label>UPLOAD RECORDED</label>
                        <span id="resUpload">0.00 Mbps</span>
                    </div>
                </div>
            </div>

            <div class="extra-stats">
                <div class="mini-card">
                    <span>Ping:</span> <strong id="resPing">--</strong>
                </div>
                <div class="mini-card">
                    <span>Jitter:</span> <strong id="resJitter">--</strong>
                </div>
                <div class="mini-card">
                    <span>Provedor:</span> <strong id="resISP">--</strong>
                </div>
            </div>

            <button id="closeOverlayBtn" class="close-btn">Refazer Teste</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
