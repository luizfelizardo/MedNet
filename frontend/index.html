<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedNET Deluxe</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

    <h1>🚀 MedNET Deluxe</h1>

    <div class="speed-box">

        <div class="speed-value" id="speed">
            0
        </div>

        <div class="speed-unit">
            Mbps
        </div>

    </div>

    <div class="stats">

        <div class="card">
            <span>Ping</span>
            <strong id="ping">--</strong>
        </div>

        <div class="card">
            <span>Jitter</span>
            <strong id="jitter">--</strong>
        </div>

        <div class="card">
            <span>Download</span>
            <strong id="download">--</strong>
        </div>

        <div class="card">
            <span>Upload</span>
            <strong id="upload">--</strong>
        </div>

    </div>

    <canvas id="chart"></canvas>

    <button id="startBtn">
        Iniciar Teste
    </button>

</div>

<script src="app.js"></script>

</body>
</html>
